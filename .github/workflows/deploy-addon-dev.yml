name: Deploy Addon Dev

concurrency:
  group: deploy-addon-dev-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'hassio-addon/**'
  workflow_dispatch:
    inputs:
      deploy_mqtt:
        description: 'Deploy Homenet2MQTT-dev (MQTT dev)'
        type: boolean
        required: true
        default: true
      deploy_matter:
        description: 'Deploy Homenet2Matter-dev (Matter dev)'
        type: boolean
        required: true
        default: true
      arch_amd64:
        description: 'Build Homenet2MQTT-dev for amd64'
        type: boolean
        required: true
        default: true
      arch_arm64:
        description: 'Build Homenet2MQTT-dev for arm64'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Timestamp Version
        id: version
        run: |
          VERSION="dev-$(TZ=Asia/Seoul date +'%Y%m%d-%H%M')"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Determine platforms
        id: set-platforms
        run: |
          # Default values for push triggers (both architectures)
          AMD64="true"
          ARM64="true"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AMD64="${{ github.event.inputs.arch_amd64 }}"
            ARM64="${{ github.event.inputs.arch_arm64 }}"
          fi
          
          PLATFORMS=""
          SMOKE_TEST=""
          
          if [ "$AMD64" = "true" ]; then
            PLATFORMS="linux/amd64"
            SMOKE_TEST="linux/amd64"
          fi
          
          if [ "$ARM64" = "true" ]; then
            if [ -n "$PLATFORMS" ]; then
              PLATFORMS="$PLATFORMS,linux/arm64"
              SMOKE_TEST="$SMOKE_TEST linux/arm64"
            else
              PLATFORMS="linux/arm64"
              SMOKE_TEST="linux/arm64"
            fi
          fi
          
          # Fallback if none selected
          if [ -z "$PLATFORMS" ]; then
            echo "No platforms selected, defaulting to linux/amd64"
            PLATFORMS="linux/amd64"
            SMOKE_TEST="linux/amd64"
          fi
          
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "smoke_test=$SMOKE_TEST" >> $GITHUB_OUTPUT
          echo "Selected platforms: $PLATFORMS"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hassio-addon/Dockerfile
          platforms: ${{ steps.set-platforms.outputs.platforms }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            nubiz/homenet2mqtt:dev
            nubiz/homenet2mqtt:${{ steps.version.outputs.VERSION }}
          secrets: |
            LOG_COLLECTOR_API_KEY=${{ secrets.LOG_COLLECTOR_API_KEY }}
            COMMENT_SECRET=${{ secrets.COMMENT_SECRET }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

      - name: Multi-arch smoke test
        run: |
          for PLATFORM in ${{ steps.set-platforms.outputs.smoke_test }}; do
            echo "Testing $PLATFORM"
            docker run --rm --entrypoint node --platform $PLATFORM nubiz/homenet2mqtt:${{ steps.version.outputs.VERSION }} \
              -v || exit 1
          done

  sync-addon-repo:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          path: source

      - name: Checkout Target Repo
        uses: actions/checkout@v6
        with:
          repository: wooooooooooook/HAaddons
          token: ${{ secrets.ADDONS_REPO_TOKEN }}
          path: target

      - name: Install js-yaml
        run: |
          mkdir -p npm_temp
          cd npm_temp
          npm install js-yaml
          mv node_modules ../source/node_modules
          cd ..
          rm -rf npm_temp

      - name: Sync Files
        run: |
          VERSION="${{ needs.build.outputs.VERSION }}"
          
          # Default to true for push triggers, respect inputs for manual dispatch
          DEPLOY_MQTT="true"
          DEPLOY_MATTER="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_MQTT="${{ github.event.inputs.deploy_mqtt }}"
            DEPLOY_MATTER="${{ github.event.inputs.deploy_matter }}"
          fi

          TYPES=""
          if [ "$DEPLOY_MQTT" = "true" ]; then
            TYPES="mqtt-dev"
          fi
          if [ "$DEPLOY_MATTER" = "true" ]; then
            if [ -n "$TYPES" ]; then
              TYPES="$TYPES,matter-dev"
            else
              TYPES="matter-dev"
            fi
          fi

          if [ -z "$TYPES" ]; then
            echo "No dev addons selected for deployment. Skipping sync."
            exit 0
          fi

          node source/scripts/generate-addons.mjs --target target --version "$VERSION" --types "$TYPES"

          # Check for changes
          cd target
          if [[ -n $(git status -s) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Update dev addons ($TYPES) (Build $VERSION)"
            git pull --rebase
            git push
          else
            echo "No changes to sync."
          fi
