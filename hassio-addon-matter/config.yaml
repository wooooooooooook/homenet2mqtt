name: Homenet2MQTT (Matter)
version: 2.15.1
breaking_versions: [2.0.0]
slug: h2m-matter
description: Bridge between RS485 HomeNet devices and Matter (supports multi-port mapping).
url: https://github.com/wooooooooooook/homenet2mqtt
arch:
  - aarch64
  - amd64
startup: application
boot: auto
image: "nubiz/homenet2mqtt"
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
hassio_role: default
host_network: true
init: false
hassio_api: true
auth_api: true
uart: true
services:
  - mqtt:need
options:
  log_level: info
  mqtt_topic_prefix: homenet2mqtt
  discovery_enabled: true
  use_supervisor_mqtt: true
  mqtt_url: ""
  mqtt_need_login: true
  mqtt_user: ""
  mqtt_passwd: ""
  config_files:
    - default.homenet_bridge.yaml
  timezone: ""
  integration_type: matter
  matter_port: 5540
  matter_passcode: 20202021
  matter_discriminator: 3840
  matter_vendor_id: 65521
  matter_product_id: 32768
  matter_product_name: "Homenet Bridge"
schema:
  log_level: list(trace|debug|info|warn|error|fatal)
  use_supervisor_mqtt: bool
  mqtt_url: str?
  mqtt_need_login: bool
  mqtt_user: str?
  mqtt_passwd: str?
  mqtt_topic_prefix: str?
  discovery_enabled: bool
  config_files:
    - str
  timezone: str?
  integration_type: list(mqtt|matter|log)
  matter_port: int?
  matter_passcode: int?
  matter_discriminator: int?
  matter_vendor_id: int?
  matter_product_id: int?
  matter_product_name: str?
ingress: true
ingress_port: 3000
ingress_stream: true
panel_icon: mdi:crop-landscape
